name: Web build

on:
  push:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-build.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-build.yml'

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: npm run build
