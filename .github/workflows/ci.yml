name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: |
          set -o pipefail
          pytest -q --tb=short --junitxml=pytest-results.xml 2>&1 | tee pytest.log
      - name: Upload API test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: |
            apps/api/pytest.log
            apps/api/pytest-results.xml

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install web dependencies
        run: npm install
      - name: Build web
        run: npm run build
